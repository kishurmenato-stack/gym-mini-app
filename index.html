<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>МайТренер Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #1a1a1a);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --card-bg: rgba(255, 255, 255, 0.08);
        }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); padding: 15px; margin: 0; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 15px; }
        
        /* Статистика и Список */
        .log-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .log-table th { color: var(--hint-color); text-align: left; padding-bottom: 8px; }
        .log-table td { padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.05); }

        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; }
        
        .selector-row { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
        .selector-item { min-width: 40px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; text-align: center; cursor: pointer; }
        .selector-item.active { background: var(--button-color); font-weight: bold; }
        
        .btn-add { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--button-color); background: transparent; color: white; font-weight: bold; margin-bottom: 10px; }
        .btn-finish { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--button-color); color: white; font-weight: bold; }
        
        .counter-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 5px; margin-bottom: 10px; }
        .btn-step { width: 40px; height: 40px; border-radius: 8px; border: none; background: var(--button-color); color: white; font-size: 20px; }
    </style>
</head>
<body>

<div class="card">
    <input type="text" id="ex-input" list="ex-list" placeholder="Упражнение...">
    <datalist id="ex-list"></datalist>

    <div class="selector-row" id="set-selector">
        <div class="selector-item active" onclick="setSet(1)">1</div>
        <div class="selector-item" onclick="setSet(2)">2</div>
        <div class="selector-item" onclick="setSet(3)">3</div>
        <div class="selector-item" onclick="setSet(4)">4</div>
        <div class="selector-item" onclick="setSet(5)">5</div>
    </div>

    <div class="counter-row">
        <button class="btn-step" onclick="step('weight', -2.5)">-</button>
        <input type="number" id="weight" value="50" style="margin:0; border:none; text-align:center; width:60px;">
        <button class="btn-step" onclick="step('weight', 2.5)">+</button>
    </div>

    <div class="counter-row">
        <button class="btn-step" onclick="step('reps', -1)">-</button>
        <input type="number" id="reps" value="10" style="margin:0; border:none; text-align:center; width:60px;">
        <button class="btn-step" onclick="step('reps', 1)">+</button>
    </div>

    <button class="btn-add" onclick="addSet()">ДОБАВИТЬ В СПИСОК</button>
</div>

<div class="card">
    <div style="font-size: 12px; color: var(--hint-color); margin-bottom: 10px;">ЖУРНАЛ ТРЕНИРОВКИ</div>
    <table class="log-table" id="log-body">
        <thead><tr><th>Упр.</th><th>Сет</th><th>Вес</th><th>Повт.</th></tr></thead>
        <tbody><!-- Сюда будут падать записи --></tbody>
    </table>
</div>

<button class="btn-finish" onclick="finishTraining()">ЗАВЕРШИТЬ ТРЕНИРОВКУ</button>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let currentSet = 1;
    let trainingLog = [];

    function addSet() {
        const ex = document.getElementById('ex-input').value;
        const w = document.getElementById('weight').value;
        const r = document.getElementById('reps').value;

        if (!ex) { tg.showAlert("Введите название!"); return; }

        // Добавляем в локальный массив
        const entry = { ex, w, r, set: currentSet };
        trainingLog.push(entry);

        // Обновляем таблицу на экране (приложение НЕ закрывается)
        const tbody = document.querySelector('#log-body tbody');
        const row = `<tr><td>${ex}</td><td>${currentSet}</td><td>${w}</td><td>${r}</td></tr>`;
        tbody.innerHTML += row;

        // Сохраняем название в автодополнение
        saveEx(ex);

        // Переключаем на следующий подход
        if(currentSet < 5) setSet(currentSet + 1);
        
        tg.HapticFeedback.notificationOccurred('success');
    }

    function finishTraining() {
        if(trainingLog.length === 0) { tg.close(); return; }
        
        // Отправляем ПОСЛЕДНЮЮ запись боту для AI-анализа 
        // (Либо можно переделать бота на прием всего массива)
        const lastEntry = trainingLog[trainingLog.length - 1];
        tg.sendData(JSON.stringify(lastEntry)); 
    }

    function setSet(n) {
        currentSet = n;
        document.querySelectorAll('.selector-item').forEach((it, i) => it.classList.toggle('active', i === n-1));
    }

    function step(id, val) {
        let el = document.getElementById(id);
        el.value = (parseFloat(el.value) + val).toFixed(1);
    }

    function saveEx(val) {
        let list = JSON.parse(localStorage.getItem('exList') || '[]');
        if(!list.includes(val)) {
            list.push(val);
            localStorage.setItem('exList', JSON.stringify(list));
            updateDatalist();
        }
    }

    function updateDatalist() {
        const list = JSON.parse(localStorage.getItem('exList') || '[]');
        document.getElementById('ex-list').innerHTML = list.map(i => `<option value="${i}">`).join('');
    }

    window.onload = updateDatalist;
</script>
</body>
</html>
