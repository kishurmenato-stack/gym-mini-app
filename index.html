<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МайТренер</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { background:#0f0f0f; color:#fff; font-family:sans-serif; padding:15px }
.card { background:#1a1a1a; border-radius:12px; padding:15px; margin-bottom:15px }
input { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none }
button { width:100%; padding:12px; background:#3390ec; color:white; border:none; border-radius:10px }

.ex { background:#222; padding:10px; border-radius:10px; margin-top:10px }
.set { display:flex; justify-content:space-between; padding:5px 0 }

.green { color:#31b545 }
.red { color:#e53935 }
.gray { color:#aaa }
</style>
</head>

<body>

<div class="card">
<input id="name" placeholder="Упражнение">
<input id="weight" type="number" placeholder="Вес">
<input id="reps" type="number" placeholder="Повторы">
<button onclick="addSet()">Добавить</button>
</div>

<div id="app"></div>

<script>
const tg = window.Telegram.WebApp;

function getData() {
  return JSON.parse(localStorage.getItem("gym") || "{}");
}

function saveData(data) {
  localStorage.setItem("gym", JSON.stringify(data));
}

function today() {
  return new Date().toISOString().split("T")[0];
}

function addSet() {
  const name = document.getElementById("name").value.trim();
  const w = +document.getElementById("weight").value;
  const r = +document.getElementById("reps").value;

  if (!name || !w || !r) return;

  const data = getData();

  if (!data[name]) data[name] = [];

  let session = data[name].find(s => s.date === today());

  if (!session) {
    session = { date: today(), sets: [] };
    data[name].push(session);
  }

  session.sets.push({ w, r, id: Date.now() });

  // сортировка
  session.sets.sort((a,b)=>a.id-b.id);

  saveData(data);
  render();
}

function getPrevSession(name, currentDate) {
  const data = getData()[name];
  if (!data) return null;

  return data
    .filter(s => s.date < currentDate)
    .sort((a,b)=> b.date.localeCompare(a.date))[0];
}

function compare(curr, prev) {
  if (!prev) return null;

  let diff = 0;

  for (let i = 0; i < Math.min(curr.sets.length, prev.sets.length); i++) {
    if (curr.sets[i].w === prev.sets[i].w) {
      diff += curr.sets[i].r - prev.sets[i].r;
    }
  }

  return diff;
}

function formatSets(sets) {
  return sets.map(s => `${s.w}×${s.r}`).join(", ");
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const data = getData();

  for (let name in data) {
    const session = data[name].find(s => s.date === today());
    if (!session) continue;

    const prev = getPrevSession(name, today());
    const diff = compare(session, prev);

    let status = "";
    if (diff !== null) {
      if (diff > 0) status = `<div class="green">+${diff} повторов 👍</div>`;
      else if (diff < 0) status = `<div class="red">${diff} повторов</div>`;
      else status = `<div class="gray">Без изменений</div>`;
    }

    app.innerHTML += `
      <div class="ex">
        <b>${name}</b>

        <div class="set">Сегодня: ${formatSets(session.sets)}</div>

        ${prev ? `<div class="set gray">Прошлый раз: ${formatSets(prev.sets)}</div>` : ""}

        ${status}
      </div>
    `;
  }
}

render();
tg.expand();
</script>

</body>
</html>
