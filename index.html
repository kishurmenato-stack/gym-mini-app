<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>МайТренер Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #3390ec;
            --hint-color: #707070;
            --gold: #ffd700;
            --success: #4caf50;
            --error: #e53935;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        h2 { margin-top: 0; font-size: 18px; color: var(--accent-color); text-align: center; }
        
        label { display: block; font-size: 11px; color: var(--hint-color); text-transform: uppercase; margin: 10px 0 5px; padding-left: 5px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        
        .calendar-trigger { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; cursor: pointer; margin-bottom: 10px; }
        .calendar-container { display: none; background: #1a1a1a; padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .calendar-container.show { display: block; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .weekday { font-size: 10px; color: var(--hint-color); padding: 5px 0; text-align: center; }
        
        .day { 
            aspect-ratio: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .day.other-month { opacity: 0.1; pointer-events: none; }
        .day.selected { background: var(--accent-color) !important; color: white; border-color: var(--accent-color); }
        /* Тот самый зеленый кружок вокруг числа */
        .day.has-data { border-color: var(--success); }
        
        .nav-btn { background: none; border: none; color: var(--accent-color); font-size: 20px; padding: 5px 15px; cursor: pointer; }

        .selector { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding: 5px 0; }
        .sel-item { min-width: 44px; height: 44px; background: rgba(255,255,255,0.08); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .sel-item.active { background: var(--accent-color); color: white; }

        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--accent-color); color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .ex-block { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent-color); }
        .ex-title { font-weight: bold; margin-bottom: 10px; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
        .record-badge { font-size: 10px; color: var(--gold); border: 1px solid rgba(255,215,0,0.3); padding: 2px 6px; border-radius: 6px; }
        
        .set-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .del-btn { color: var(--error); background: none; border: none; font-size: 20px; cursor: pointer; }
        
        .history-box { font-size: 11px; margin-top: 8px; color: var(--hint-color); padding-top: 8px; border-top: 1px dashed #333; }
    </style>
</head>
<body>

<div class="card">
    <div class="calendar-trigger" onclick="toggleCalendar()">
        <span>📅 <b id="date-str">Выбрать дату</b></span>
        <span>▼</span>
    </div>
    
    <div class="calendar-container" id="calendar-view">
        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
            <b id="month-name"></b>
            <button class="nav-btn" onclick="changeMonth(1)">❯</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <label>Упражнение</label>
    <input type="text" id="ex-name" placeholder="Нажми для выбора..." list="ex-list">
    <datalist id="ex-list"></datalist>

    <label>Подход</label>
    <div class="selector" id="set-selector">
        <div class="sel-item active" onclick="setNum(1)">1</div>
        <div class="sel-item" onclick="setNum(2)">2</div>
        <div class="sel-item" onclick="setNum(3)">3</div>
        <div class="sel-item" onclick="setNum(4)">4</div>
        <div class="sel-item" onclick="setNum(5)">5</div>
    </div>

    <div style="display:flex; gap:10px;">
        <div style="flex:1"><label>Вес</label><input type="number" id="weight" value="60"></div>
        <div style="flex:1"><label>Повторы</label><input type="number" id="reps" value="10"></div>
    </div>

    <button class="btn-main" onclick="addSet()">СОХРАНИТЬ ПОДХОД</button>
</div>

<div id="log"></div>

<script>
    const tg = window.Telegram.WebApp;
    const DB_NAME = 'gym_v8_stable'; // Новая версия для чистоты данных
    
    // Исправление бага с датой: берем локальную дату в формате YYYY-MM-DD
    const getTodayStr = (date = new Date()) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    };

    let selDate = getTodayStr();
    let viewDate = new Date();
    let curSet = 1;

    function getStore() { return JSON.parse(localStorage.getItem(DB_NAME) || '{}'); }
    function setStore(data) { localStorage.setItem(DB_NAME, JSON.stringify(data)); }

    function toggleCalendar() { document.getElementById('calendar-view').classList.toggle('show'); }

    function changeMonth(dir) {
        viewDate.setMonth(viewDate.getMonth() + dir);
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const data = getStore();
        grid.innerHTML = '';
        
        const mNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        document.getElementById('month-name').innerText = `${mNames[viewDate.getMonth()]} ${viewDate.getFullYear()}`;

        ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"].forEach(d => grid.innerHTML += `<div class="weekday">${d}</div>`);

        const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
        const last = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0);
        let startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;

        for (let i = 0; i < startDay; i++) grid.innerHTML += `<div class="day other-month"></div>`;

        for (let i = 1; i <= last.getDate(); i++) {
            const currentLoopDate = getTodayStr(new Date(viewDate.getFullYear(), viewDate.getMonth(), i));
            
            let hasData = false;
            for (let ex in data) {
                if (data[ex].some(d => d.date === currentLoopDate)) hasData = true;
            }

            const div = document.createElement('div');
            div.className = `day ${currentLoopDate === selDate ? 'selected' : ''} ${hasData ? 'has-data' : ''}`;
            div.innerText = i;
            div.onclick = () => {
                selDate = currentLoopDate;
                document.getElementById('date-str').innerText = selDate;
                toggleCalendar();
                renderCalendar();
                render();
            };
            grid.appendChild(div);
        }
    }

    function setNum(n) {
        curSet = n;
        document.querySelectorAll('.sel-item').forEach((el, i) => el.classList.toggle('active', i === n-1));
    }

    function addSet() {
        const name = document.getElementById('ex-name').value.trim();
        const w = document.getElementById('weight').value;
        const r = document.getElementById('reps').value;
        if(!name || !w) return;

        let data = getStore();
        if(!data[name]) data[name] = [];
        let day = data[name].find(d => d.date === selDate);
        if(!day) { day = {date: selDate, sets: []}; data[name].push(day); }
        
        day.sets.push({w: parseFloat(w), r: parseInt(r), n: curSet, id: Date.now()});
        setStore(data);
        
        if(curSet < 5) setNum(curSet + 1);
        renderCalendar();
        render();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function render() {
        const log = document.getElementById('log');
        const data = getStore();
        document.getElementById('date-str').innerText = selDate;
        log.innerHTML = '';
        
        let found = false;
        for(let name in data) {
            const day = data[name].find(d => d.date === selDate);
            if(!day) continue;
            found = true;

            let bestW = 0, bestR = 0;
            data[name].forEach(d => d.sets.forEach(s => {
                if(s.w > bestW || (s.w === bestW && s.r > bestR)) { bestW = s.w; bestR = s.r; }
            }));

            const prev = data[name].filter(d => d.date < selDate).sort((a,b) => b.date.localeCompare(a.date))[0];

            let html = `<div class="ex-block"><div class="ex-title">${name} <span class="record-badge">${bestW}кг х ${bestR} рекорд</span></div>`;
            day.sets.forEach(s => {
                html += `<div class="set-row"><span>Сет ${s.n}: <b>${s.w}кг × ${s.r}</b></span><button class="del-btn" onclick="delSet('${name}','${s.id}')">×</button></div>`;
            });
            if(prev) html += `<div class="history-box">Прошлый раз: ${prev.sets.map(ps => ps.w+'×'+ps.r).join(', ')}</div>`;
            log.innerHTML += html + `</div>`;
        }
        if(!found) log.innerHTML = '<p style="text-align:center; color:var(--hint-color)">Нет записей за этот день</p>';
        
        const dl = document.getElementById('ex-list');
        dl.innerHTML = Object.keys(data).map(n => `<option value="${n}">`).join('');
    }

    function delSet(name, id) {
        let data = getStore();
        data[name] = data[name].map(d => ({...d, sets: d.sets.filter(s => s.id != id)})).filter(d => d.sets.length > 0);
        if(!data[name].length) delete data[name];
        setStore(data); renderCalendar(); render();
    }

    window.onload = () => { renderCalendar(); render(); tg.expand(); };
</script>
</body>
</html>
