<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>МайТренер Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #1a1a1a);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px; width: 100%; max-width: 400px; box-sizing: border-box; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--hint-color); }
        select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 16px; box-sizing: border-box; }
        .selector-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .selector-item { flex: 1; text-align: center; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid transparent; }
        .selector-item.active { background: var(--button-color); border-color: white; }
        .counter-group { display: flex; align-items: center; gap: 10px; }
        .btn-round { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--button-color); color: white; font-size: 20px; cursor: pointer; }
        .main-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--button-color); color: white; font-size: 16px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <label>Выберите день тренировки</label>
    <div class="selector-row" id="day-selector">
        <div class="selector-item active" onclick="setDay(1)">День 1</div>
        <div class="selector-item" onclick="setDay(2)">День 2</div>
        <div class="selector-item" onclick="setDay(3)">День 3</div>
    </div>

    <div class="input-group">
        <label>Название упражнения (впишите сами)</label>
        <input type="text" id="exercise" placeholder="Например: Жим штанги">
    </div>

    <label>Номер подхода</label>
    <div class="selector-row" id="set-selector">
        <div class="selector-item active" onclick="setSet(1)">1</div>
        <div class="selector-item" onclick="setSet(2)">2</div>
        <div class="selector-item" onclick="setSet(3)">3</div>
        <div class="selector-item" onclick="setSet(4)">4</div>
        <div class="selector-item" onclick="setSet(5)">5</div>
    </div>

    <div class="input-group">
        <label>Вес (кг)</label>
        <div class="counter-group">
            <button class="btn-round" onclick="change('weight', -2.5)">-</button>
            <input type="number" id="weight" value="50" step="0.5">
            <button class="btn-round" onclick="change('weight', 2.5)">+</button>
        </div>
    </div>

    <div class="input-group">
        <label>Повторения</label>
        <div class="counter-group">
            <button class="btn-round" onclick="change('reps', -1)">-</button>
            <input type="number" id="reps" value="10">
            <button class="btn-round" onclick="change('reps', 1)">+</button>
        </div>
    </div>

    <button class="main-btn" onclick="sendData()">СОХРАНИТЬ ПОДХОД</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let currentDay = 1;
    let currentSet = 1;

    function setDay(day) {
        currentDay = day;
        updateUI('day-selector', day - 1);
    }

    function setSet(set) {
        currentSet = set;
        updateUI('set-selector', set - 1);
    }

    function updateUI(containerId, activeIndex) {
        let items = document.getElementById(containerId).getElementsByClassName('selector-item');
        for (let i = 0; i < items.length; i++) {
            items[i].classList.remove('active');
        }
        items[activeIndex].classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }

    function change(id, delta) {
        let input = document.getElementById(id);
        input.value = (parseFloat(input.value) + delta).toFixed(1);
        tg.HapticFeedback.impactOccurred('light');
    }

    function sendData() {
        let data = {
            day: currentDay,
            ex: document.getElementById("exercise").value || "Без названия",
            set: currentSet,
            w: document.getElementById("weight").value,
            r: document.getElementById("reps").value
        };
        tg.sendData(JSON.stringify(data));
    }
</script>
</body>
</html>
